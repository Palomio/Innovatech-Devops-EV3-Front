apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-innovatech-deployment
  namespace: default
  labels:
    app: front-innovatech
spec:
  replicas: 2
  selector:
    matchLabels:
      app: front-innovatech
  template:
    metadata:
      labels:
        app: front-innovatech
    spec:
      containers:
      - name: front-innovatech
        image: 363163918702.dkr.ecr.us-east-1.amazonaws.com/front:lates
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "150m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: front-innovatech-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: front-innovatech
  ports:
  - protocol: TCP
    port: 80  
    targetPort: 80 